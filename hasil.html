<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil AI - Bos Cerdas Cilegon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050508; 
            color: #f8fafc;
            overflow-x: hidden;
        }

        /* Neon Glow Effect */
        .neon-shadow {
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.4), 0 0 40px rgba(45, 212, 191, 0.1);
        }
    </style>
</head>
<body class="relative min-h-screen flex items-center justify-center p-6 font-sans">

    <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-indigo-600/20 blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-5%] w-[400px] h-[400px] rounded-full bg-rose-600/10 blur-[100px] pointer-events-none z-0"></div>

    <div class="relative z-10 bg-white/[0.03] backdrop-blur-2xl max-w-4xl w-full rounded-[2.5rem] shadow-[0_8px_32px_rgba(0,0,0,0.5)] border border-white/10 flex flex-col md:flex-row overflow-hidden">
        
        <div class="md:w-1/2 p-8 md:p-12 border-b md:border-b-0 md:border-r border-white/10 flex flex-col justify-center text-center relative bg-gradient-to-b from-transparent to-black/20">
            <div class="inline-flex justify-center mb-8">
                <div class="bg-teal-500/10 text-teal-300 font-bold px-4 py-1.5 rounded-full text-sm border border-teal-500/20">
                    🎉 Profil Bisnismu Siap!
                </div>
            </div>
            
            <div class="w-40 h-40 mx-auto rounded-full shadow-2xl mb-6 border border-white/20 overflow-hidden bg-black/40 flex items-center justify-center backdrop-blur-md relative group">
                <img id="logoAI" src="" alt="Logo UMKM" class="hidden w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                <span id="logoLoading" class="text-sm font-medium text-slate-500 animate-pulse">Memuat...</span>
            </div>

            <div id="downloadContainer" class="hidden mb-6">
                <button id="btnDownload" class="w-full py-3 bg-slate-800 hover:bg-teal-600 text-white rounded-xl font-bold flex items-center justify-center gap-2 transition-all border border-slate-700 active:scale-95">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 3v12"/></svg>
                    Download Poster
                </button>
            </div>
            
            <h2 class="text-3xl font-extrabold text-white mb-3 tracking-tight">Nama Usaha</h2>
            <p class="text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-indigo-400 font-medium italic mb-6 text-lg">
                "Slogan Usaha"
            </p>
            
            <div class="bg-black/40 p-5 rounded-2xl shadow-inner text-sm text-slate-300 text-left border border-white/5 backdrop-blur-sm">
                <strong class="text-white block mb-2 flex items-center gap-2">💡 Ide Promosi IG:</strong>
                <span id="promosiText">Isi promosi...</span>
            </div>
        </div>

        <div class="md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
            <h3 class="text-3xl font-bold text-white mb-3 tracking-tight">Suka Hasilnya? 😍</h3>
            <p class="text-slate-400 mb-8 text-sm leading-relaxed">Daftar sekarang untuk menyimpan profil ini secara gratis ke database.</p>

            <form class="space-y-5 text-left">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Nama Pemilik</label>
                    <input type="text" id="regNama" class="w-full px-5 py-3.5 rounded-xl bg-black/40 border border-white/10 text-white outline-none focus:ring-2 focus:ring-teal-500" placeholder="Misal: Maulana">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Nomor WhatsApp</label>
                    <input type="tel" id="regWA" class="w-full px-5 py-3.5 rounded-xl bg-black/40 border border-white/10 text-white outline-none focus:ring-2 focus:ring-teal-500" placeholder="0812xxxx">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Password</label>
                    <input type="password" id="regPass" class="w-full px-5 py-3.5 rounded-xl bg-black/40 border border-white/10 text-white outline-none focus:ring-2 focus:ring-teal-500" placeholder="Buat sandi aman">
                </div>
                
                <button type="button" id="btnDaftar" class="w-full bg-gradient-to-r from-teal-500 to-indigo-600 text-white font-bold py-4 rounded-xl transition-all mt-6 neon-shadow border border-white/10 active:scale-95">
                    Simpan Profil & Daftar Akun
                </button>
            </form>
        </div>
    </div>

    <script>
        const rawData = localStorage.getItem('hasilAI');
        if (rawData) {
            const data = JSON.parse(rawData);
            document.querySelector('h2').innerText = data.nama;
            document.querySelector('.italic').innerText = `"${data.slogan}"`;
            document.getElementById('promosiText').innerText = data.promosi;

            const logoAI = document.getElementById('logoAI');
            const logoLoading = document.getElementById('logoLoading');
            const btnDownload = document.getElementById('btnDownload');
            const downloadContainer = document.getElementById('downloadContainer');

            if (data.logo_base64) {
                logoAI.src = data.logo_base64;
                logoAI.classList.remove('hidden');
                logoLoading.classList.add('hidden');
                downloadContainer.classList.remove('hidden');

                btnDownload.addEventListener('click', function() {
                    const link = document.createElement('a');
                    link.href = data.logo_base64;
                    link.download = `Poster-${data.nama.replace(/\s+/g, '-')}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                });
            }

            // LOGIKA NO 4: KIRIM KE GOOGLE SHEETS
            const btnDaftar = document.getElementById('btnDaftar');
            btnDaftar.addEventListener('click', async function() {
                const namaVal = document.getElementById('regNama').value;
                const waVal = document.getElementById('regWA').value;
                const passVal = document.getElementById('regPass').value;

                if(!namaVal || !waVal || !passVal) return alert("Isi semua data dulu Bess!");

                btnDaftar.innerText = "⏳ Sedang Menyimpan...";
                btnDaftar.disabled = true;

                try {// Tembak data pendaftar ke Cloud Run (Relatif ke domain yang sama)
const res = await fetch('/daftar', { // <--- Cukup tulis /daftar
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nama: namaVal, whatsapp: waVal, password: passVal })
});
                    const resData = await res.json();
                    if(resData.status === "sukses") {
                        alert("GOKIL! Datamu sudah masuk! 🚀");
                        window.location.href = 'index.html'; // Balik ke beranda
                    }
                } catch (e) {
                    alert("Waduh gagal nyambung ke server Python.");
                } finally {
                    btnDaftar.innerText = "Simpan Profil & Daftar Akun";
                    btnDaftar.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
